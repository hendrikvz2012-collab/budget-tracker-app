<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Dollar sign -->
    <text text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="bold" font-size="240" fill="white">$</text>
    <!-- Chart line -->
    <polyline points="-80,140 0,100 80,140" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-80,100 -20,40 60,80" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="80" r="10" fill="white"/>
  </g>
</svg>
